<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant ChatBot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Restaurant ChatBot</h1>
            <p>Your friendly AI ordering assistant</p>
        </div>
        <div class="chat-container">
            <div class="messages" id="messages"></div>
            <div class="loading" id="loading" style="display: none;">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="messageInput" class="message-input" placeholder="Type option number..." autocomplete="off"/>
                <button id="sendBtn" class="send-btn">Send</button>
            </div>
        </div>
        <div class="footer">
            <p>Session: <span id="sessionId">Loading...</span></p>
            <button id="resetBtn" class="reset-btn">Clear</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
